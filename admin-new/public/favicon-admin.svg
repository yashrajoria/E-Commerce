<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="adminGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" fill="#1a1a2e" rx="8"/>
  
  <!-- Admin dashboard icon - grid/dashboard symbol -->
  <g transform="translate(6, 6)">
    <!-- Top left box -->
    <rect x="0" y="0" width="4" height="4" fill="url(#adminGrad)" rx="1"/>
    
    <!-- Top right box -->
    <rect x="6" y="0" width="4" height="4" fill="url(#adminGrad)" rx="1" opacity="0.8"/>
    
    <!-- Bottom left larger box -->
    <rect x="0" y="6" width="4" height="4" fill="url(#adminGrad)" rx="1" opacity="0.9"/>
    
    <!-- Bottom right large box -->
    <rect x="6" y="6" width="4" height="4" fill="url(#adminGrad)" rx="1"/>
  </g>
  
  <!-- Accent dots -->
  <circle cx="26" cy="8" r="1.5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="28" cy="12" r="1" fill="#10b981" opacity="0.6"/>
</svg>
