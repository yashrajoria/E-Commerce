<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="storefrontGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" fill="#1a1a2e" rx="8"/>
  
  <!-- Shopping bag / shopping cart -->
  <g transform="translate(8, 6)">
    <!-- Bag body -->
    <path d="M 2 2 L 2 12 Q 2 14 4 14 L 12 14 Q 14 14 14 12 L 14 2 Z" 
          fill="none" stroke="url(#storefrontGrad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Handle -->
    <path d="M 4 2 Q 4 -1 8 -1 Q 12 -1 12 2" 
          fill="none" stroke="url(#accentGrad)" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Price tag / cart item indicator -->
    <circle cx="10" cy="8" r="1.5" fill="url(#storefrontGrad)"/>
  </g>
  
  <!-- Shopping cart accent dots -->
  <circle cx="24" cy="10" r="1.5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="26" cy="18" r="1" fill="#10b981" opacity="0.7"/>
  <circle cx="6" cy="26" r="1" fill="#f59e0b" opacity="0.6"/>
</svg>
